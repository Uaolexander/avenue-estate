name: Sync listings from Telegram

on:
  schedule:
    - cron: '15 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/fetch-telegram.mjs
      - name: Commit if listings changed
        run: |
          if ! git diff --quiet public/properties.json; then
            git config user.name "avenue-bot"
            git config user.email "actions@github.com"
            git add public/properties.json
            git commit -m "chore: refresh listings from Telegram"
            git push
          else
            echo "No changes"
          fi
